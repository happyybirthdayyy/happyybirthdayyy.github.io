<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pibesdeyy</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: #7b0f14;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  color: white;
}

.container {
  text-align: center;
  width: 100%;
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.2rem);
  letter-spacing: 2px;
  font-weight: 500;
}

.subtitle {
  margin-top: 14px;
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.75rem, 2.5vw, 0.9rem);
  letter-spacing: 1px;
  opacity: 0.75;
}

.line {
  width: 60px;
  height: 1px;
  background: rgba(255,255,255,0.4);
  margin: 25px auto;
}

.heart {
  margin: 30px auto;
  width: clamp(80px, 25vw, 120px);
  opacity: 0.9;
}

.buttons {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
}

.yes {
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  letter-spacing: 2px;
  padding: 8px 12px;
  border: none;
  background: none;
  color: white;
  border-bottom: 1px solid white;
  cursor: pointer;
  transition: 0.3s;
}

.yes:hover {
  opacity: 0.7;
}

.no {
  font-size: 0.8rem;
  letter-spacing: 1px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  pointer-events: none;
  cursor: default;
}

#page1, #page2 {
  display: none;
}

.hidden {
  display: none;
}

.fade {
  animation: fade 0.8s ease;
}

.back-btn {
  margin-top: 40px;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 2px;
  opacity: 0.7;
  cursor: pointer;
  transition: 0.3s;
}

.back-btn:hover {
  opacity: 1;
  transform: translateX(-5px);
}

.birthday-page {
  background: #7b0f14;
  position: relative;
  overflow: hidden;
}

.birthday-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2rem, 6vw, 2.5rem);
  margin-bottom: 10px;
}

.birthday-sub {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-bottom: 25px;
}

.photo-wall {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 30px;
}

.polaroid {
  width: 100%;
  background: white;
  padding: 10px 10px 20px 10px;
  border-radius: 10px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.polaroid img {
  width: 100%;
  height: clamp(120px, 30vw, 160px);
  object-fit: cover;
  border-radius: 6px;
  display: block;
}

.polaroid:hover {
  transform: scale(1.08);
  z-index: 10;
}

.polaroid:nth-child(1) { transform: rotate(-2deg); }
.polaroid:nth-child(2) { transform: rotate(2deg); }
.polaroid:nth-child(3) { transform: rotate(1deg); }
.polaroid:nth-child(4) { transform: rotate(-1deg); }

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

@media (max-width: 400px) {
  h1 {
    letter-spacing: 1px;
  }

  .buttons {
    flex-direction: column;
    gap: 15px;
  }

  .photo-wall {
    grid-template-columns: 1fr;
  }
}

.buttons.dual {
  justify-content: space-between;
  width: 100%;
  margin-top: 30px;
}

.nav-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 2px;
  padding: 8px 12px;
  border: none;
  background: none;
  color: white;
  border-bottom: 1px solid white;
  cursor: pointer;
  transition: 0.3s;
}

.nav-btn:hover {
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="container fade" id="page1">
  <h1>HI, LOVE!</h1>

  <div class="subtitle">
    DO YOU WANT TO SEE A LITTLE SURPRISE FOR YOU?
  </div>

  <div class="line"></div>

  <svg class="heart" viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="1.5">
    <path d="M50 80
             C20 60, 10 40, 25 25
             C35 15, 50 25, 50 35
             C50 25, 65 15, 75 25
             C90 40, 80 60, 50 80Z"/>
  </svg>

  <div class="buttons">
    <button class="yes" onclick="goNext()">YES!!</button>
    <button class="no" id="noBtn">NO THANKS</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="container hidden fade birthday-page" id="page2">

  <h1 class="birthday-title">Happy Birthday</h1>

  <div class="birthday-sub">
    a collection of memories with you
  </div>

  <div class="photo-wall">
    <div class="polaroid"><img src="https://picsum.photos/200?1"></div>
    <div class="polaroid"><img src="https://picsum.photos/200?2"></div>
    <div class="polaroid"><img src="https://picsum.photos/200?3"></div>
    <div class="polaroid"><img src="https://picsum.photos/200?4"></div>
  </div>

  <div class="buttons dual">
    <button class="nav-btn" onclick="goBack()">← BACK</button>
  <button class="nav-btn" onclick="goNextPage()">NEXT →</button>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const savedPage = localStorage.getItem("page") || "page1";
  document.getElementById(savedPage).style.display = "block";
});

function showPage(pageId) {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "none";

  document.getElementById(pageId).style.display = "block";
  localStorage.setItem("page", pageId);
}

function goNext() {
  showPage("page2");
}

function goBack() {
  showPage("page1");
}

// NEXT (buat nanti kalau kamu tambah page3 lagi)
function goNextPage() {
  alert("Next page belum dibuat 😏");
}
</script>

</body>
</html>
